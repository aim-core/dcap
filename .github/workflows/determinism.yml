name: Determinism Proof

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install DCAP
        run: |
          pip install -e .
          echo "PYTHONPATH=src" >> $GITHUB_ENV
      - name: Self-Verification
        run: |
          export PYTHONPATH="$PYTHONPATH:src"
          python -m interfaces.cli.dcap_cli verify
      - name: Analyze Test
        run: |
          export PYTHONPATH="$PYTHONPATH:src"
          mkdir -p /tmp/test_project
          echo "eval('test')" > /tmp/test_project/bad.py
          python -m interfaces.cli.dcap_cli analyze /tmp/test_project --tier RED --format json > linux-result.json
      - uses: actions/upload-artifact@v4
        with:
          name: linux-result
          path: linux-result.json

  verify-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install DCAP
        run: |
          pip install -e .
          echo "PYTHONPATH=src" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Self-Verification
        run: |
          $env:PYTHONPATH = "src"
          python -m interfaces.cli.dcap_cli verify
      - name: Analyze Test
        run: |
          $env:PYTHONPATH = "src"
          mkdir C:\test_project
          echo eval('test') > C:\test_project\bad.py
          python -m interfaces.cli.dcap_cli analyze C:\test_project --tier RED --format json > windows-result.json
      - uses: actions/upload-artifact@v4
        with:
          name: windows-result
          path: windows-result.json

  verify-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install DCAP
        run: |
          pip install -e .
          echo "PYTHONPATH=src" >> $GITHUB_ENV
      - name: Self-Verification
        run: |
          export PYTHONPATH="$PYTHONPATH:src"
          python -m interfaces.cli.dcap_cli verify
      - name: Analyze Test
        run: |
          export PYTHONPATH="$PYTHONPATH:src"
          mkdir -p /tmp/test_project
          echo "eval('test')" > /tmp/test_project/bad.py
          python -m interfaces.cli.dcap_cli analyze /tmp/test_project --tier RED --format json > macos-result.json
      - uses: actions/upload-artifact@v4
        with:
          name: macos-result
          path: macos-result.json

  compare-results:
    needs: [verify-linux, verify-windows, verify-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux-result
          path: results/linux
      - uses: actions/download-artifact@v4
        with:
          name: windows-result
          path: results/windows
      - uses: actions/download-artifact@v4
        with:
          name: macos-result
          path: results/macos
      - name: Compare Artifact Hashes
        run: |
          LINUX_HASH=$(cat results/linux/linux-result.json | python3 -c "import sys,json; print(json.load(sys.stdin)['artifact_hash'])")
          WINDOWS_HASH=$(cat results/windows/windows-result.json | python3 -c "import sys,json; print(json.load(sys.stdin)['artifact_hash'])")
          MACOS_HASH=$(cat results/macos/macos-result.json | python3 -c "import sys,json; print(json.load(sys.stdin)['artifact_hash'])")
          echo "Linux:   $LINUX_HASH"
          echo "Windows: $WINDOWS_HASH"
          echo "macOS:   $MACOS_HASH"
          if [ "$LINUX_HASH" = "$WINDOWS_HASH" ] && [ "$WINDOWS_HASH" = "$MACOS_HASH" ]; then
            echo "DETERMINISM PROVED: All 3 platforms identical."
          else
            echo "DETERMINISM FAILED."
            exit 1
          fi