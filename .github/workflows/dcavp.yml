name: DCAVP Security Scan

on: [push, pull_request]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run DCAVP scan
        run: |
          pip install dcavp
          dcavp check . --fail-on critical --format html --output dcavp-report.html
      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dcavp-security-report
          path: dcavp-report.html
