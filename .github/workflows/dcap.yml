name: DCAP Security Scan

on: [push, pull_request]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run DCAP scan
        run: |
          - run: pip install -e .
          dcap check . --fail-on critical --format html --output dcap-report.html
      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dcap-security-report
          path: dcap-report.html
