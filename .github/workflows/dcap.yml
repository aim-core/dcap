name: DCAP Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install DCAP
        run: pip install -e .

      - name: Run self-verification
        run: dcap verify

      - name: Run analysis on source
        run: dcap analyze src --tier RED